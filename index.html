<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pint — Coming Soon</title>
  <meta name="description" content="Pint (Pythonic Interface for Nanoscale Tasks) — Website coming soon." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #ffffff;
      --card: #fbfcfd;
      --muted: #6b7280;
      --accent: #0b76ef;
      --glass: rgba(11,118,239,0.06);
      --shadow: 0 6px 24px rgba(15,23,42,0.06);
      color-scheme: light;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background: linear-gradient(180deg,#ffffff 0%, #fbfdff 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .card{
      width:100%;
      max-width:880px;
      background:var(--card);
      border-radius:18px;
      padding:44px;
      box-shadow:var(--shadow);
      display:grid;
      grid-template-columns: 1fr 320px;
      gap:28px;
      align-items:center;
    }

    @media (max-width:840px){
      .card{grid-template-columns:1fr; padding:32px}
    }

    .brand{
      display:flex;align-items:center;gap:14px
    }
    .logo{
      width:64px;height:64px;border-radius:12px;display:grid;place-items:center;
      background:linear-gradient(135deg,var(--accent), #6dd5fa);
      box-shadow:0 4px 18px rgba(11,118,239,0.12);
      flex:0 0 64px;
    }
    .logo svg{width:36px;height:36px;display:block}

    h1{margin:8px 0 0;font-size:28px;letter-spacing:-0.02em}
    .subtitle{margin-top:6px;color:var(--muted);font-weight:500}

    .left {
      padding-right:6px;
    }

    .lead{
      margin-top:22px;font-size:18px;line-height:1.45;color:#374151
    }

    .soon{
      margin-top:28px;display:flex;gap:12px;align-items:center;flex-wrap:wrap
    }

    .pill{
      background:var(--glass);border-radius:999px;padding:8px 14px;font-weight:600;color:var(--accent);border:1px solid rgba(11,118,239,0.08)
    }

    /* right column */
    .right{
      background:linear-gradient(180deg, rgba(11,118,239,0.03), rgba(6,60,120,0.01));
      border-radius:12px;padding:18px;align-self:stretch;display:flex;flex-direction:column;gap:12px;justify-content:center
    }

    .count{
      font-size:40px;font-weight:700;letter-spacing:-0.02em
    }

    .muted{color:var(--muted);font-size:13px}

    form{display:flex;gap:8px;margin-top:4px}
    input[type="email"]{flex:1;padding:12px 14px;border-radius:10px;border:1px solid #e6eefc;background:white}
    button{padding:12px 14px;border-radius:10px;border:0;background:var(--accent);color:white;font-weight:600;cursor:pointer}
    button:active{transform:translateY(1px)}

    footer{margin-top:18px;font-size:13px;color:var(--muted)}

    /* subtle animations */
    .card{opacity:0;transform:translateY(8px);animation:enter 700ms cubic-bezier(.2,.9,.3,1) forwards}
    @keyframes enter{to{opacity:1;transform:none}}

    .sparkle{position:absolute;right:24px;top:18px;opacity:.12}

    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  </style>
</head>
<body>
  <main class="card" role="main" aria-labelledby="title">
    <div class="left">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <!-- simple atom-like emblem -->
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="32" cy="32" r="10" fill="white" opacity="0.95"/>
            <path d="M12 32c0 9.941 8.059 18 18 18s18-8.059 18-18S39.941 14 30 14 12 22.059 12 32z" stroke="white" stroke-opacity="0.18" stroke-width="2"/>
            <path d="M10 22c12 4 34 4 44 0" stroke="white" stroke-opacity="0.08" stroke-width="2"/>
          </svg>
        </div>
        <div>
          <h1 id="title">Pint</h1>
          <div class="subtitle">Pythonic Interface for Nanoscale Tasks</div>
        </div>
      </div>

      <p class="lead">Pint — <strong>website will be here soon.</strong></p>

      <div class="soon">
        <div class="pill">Launching soon</div>
        <div class="muted">Want updates?</div>
      </div>

      <footer class="muted">Copyleft 2025-2026</footer>
    </div>

    <aside class="right" aria-label="Notify me" role="region">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="muted">Stay in the loop</div>
          <div class="count" aria-hidden="true">Get updates</div>
        </div>
        <div style="font-size:12px;color:var(--muted)">v0.1</div>
      </div>

      <form onsubmit="event.preventDefault(); alert('Thanks! We\'ll be in touch.')" aria-label="Subscribe to updates">
        <label for="email" class="sr-only">Email address</label>
        <input id="email" type="email" placeholder="your@email.com" required />
        <button type="submit">Notify me</button>
      </form>

      <div class="muted">Or email to <a href="mailto:sblisesivdin@gmail.com">Prof. Lisesivdin</a> for more</div>
    </aside>

    <!-- decorative sparkles -->
    <svg class="sparkle" width="72" height="72" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5L12 2z" fill="#0b76ef" opacity="0.12"/>
    </svg>
  </main>

</body>
</html>
